<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% block head %}
    <title>{% block title %}Webhook Contador{% endblock %}</title>
    <style>
        body {
            background-color: #151e2c;
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #161b22;
            padding: 1rem;
            border-bottom: 1px solid #30363d;
        }
        nav a {
            color: #58a6ff;
            margin-right: 1rem;
            text-decoration: none;
        }
        nav a:hover {
            text-decoration: underline;
        }
        main {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        h1 {
            color: #88cf94;
        }
        pre {
            background: #161b22;
            padding: 1rem;
            border-radius: 6px;
            overflow-x: auto;
        }
        footer {
            text-align: center;
            padding: 1rem;
            background: #161b22;
            border-top: 1px solid #30363d;
            color: #8b949e;
        }
    </style>
    {% endblock %}
</head>
<body>
    <header>
        <nav>
            <a href="/stats">Estatísticas</a>
            <a href="/ultimo">Último Webhook</a>
        </nav>
    </header>

    <main>
        {% block content %}
        {% endblock %}
    </main>

    <footer>
        {% block footer %}
        <p>Webhook Contador • Última atualização: {{ timestamp_atual | default("não disponível") }}</p>
        {% endblock %}
    </footer>
</body>
</html>
